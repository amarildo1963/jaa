<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - Anerão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://amarildo1963.github.io/jaa/fotos/favicon.png">
    
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --sepia-gold: #b8860b;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed; 
            color: #333;
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* OVERLAY */
        #birthday-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .overlay-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* HEADER */
        header { 
            text-align: center; 
            padding: 40px 20px; 
        }
        
        .header-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
        }

        .img-topo { width: 60px; transition: transform 0.3s ease; cursor: pointer; }
        .img-topo:hover { transform: rotate(10deg) scale(1.1); }
        
        h1 { color: var(--primary-blue); font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }

        /* CONTROLS */
        .controls { 
            max-width: 800px; 
            margin: 0 auto 30px; 
            display: flex; 
            gap: 15px; 
            padding: 0 20px;
            justify-content: center; 
        }

        #searchInput { 
            flex: 1; 
            padding: 12px 20px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            box-shadow: var(--shadow);
            outline: none;
            transition: border-color 0.3s;
        }

        #searchInput:focus { border-color: var(--accent-blue); }

        .btn-action {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-limpar { background: #eee; color: #666; }
        .btn-limpar:hover { background: #ddd; }

        /* CARDS */
        .mes-section { margin-bottom: 50px; }
        .mes-titulo { 
            color: var(--danger-red); 
            font-size: 1.8rem; 
            text-align: center; 
            margin: 40px 0 25px; 
            font-weight: 700;
            text-transform: uppercase;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px;
        }

        .registro-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
            transition: transform 0.3s, box-shadow 0.3s; 
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .registro-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        .img-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
            position: relative;
        }

        .img-pessoa { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 3px solid var(--sepia-gold);
        }

        /* MENUS E ICONS */
        .card-actions {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }

        .icon-btn { 
            width: 32px; 
            height: 32px; 
            cursor: pointer; 
            background: white; 
            border-radius: 50%; 
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .icon-btn:hover { transform: scale(1.2); }

        /* TEXT STYLES */
        .nome { color: var(--primary-blue); font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; display: block; }
        .info-label { font-size: 0.9rem; font-weight: 500; }
        .viva { color: var(--success-green); }
        .falecida { color: var(--sepia-gold); }

        /* SCROLL BUTTONS */
        .nav-scroll {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .btn-scroll {
            width: 50px;
            height: 50px;
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }
        .btn-scroll:hover { background: var(--accent-blue); }

        footer {
            background: #f8fafc;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            margin-top: 60px;
        }

        .highlight { background: #fef08a; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="birthday-overlay" onclick="this.style.display='none'">
        <div class="overlay-content">
            <div id="overlay-data"></div>
            <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.8;">Toque para continuar</p>
        </div>
    </div>

    <nav class="nav-scroll">
        <a href="#" class="btn-scroll" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</a>
        <a href="#" class="btn-scroll" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">▼</a>
    </nav>

    <header>
        <div class="header-container">
            <img src="aniver.png" alt="Logo" class="img-topo" onclick="location.reload()">
            <h1>Aniversariantes</h1>
        </div>
    </header>

    <main>
        <section class="controls">
            <input type="text" id="searchInput" placeholder="Buscar por nome, mês, signo ou status...">
            <button class="btn-action btn-limpar" onclick="limparBusca()">Limpar</button>
            <img src="familia_anerao.png" alt="Família" class="icon-btn" style="width: 45px; height: 45px;" onclick="filtrarAnerao()">
        </section>

        <div id="stats" style="text-align: center; font-weight: 500; margin-bottom: 20px; color: #64748b;"></div>

        <div id="main-content"></div>
    </main>

    <footer>
        <p>© 2016 - 2026 J.A. Anerão</p>
        <p style="font-size: 0.9rem; color: #64748b;">Versão 2.0 | jaanerao@hotmail.com</p>
        <div style="margin-top: 15px;">
            <a href="manut.html"><img src="manut.png" alt="Config" class="icon-btn"></a>
        </div>
    </footer>

    <script>
        const BASE_IMG_URL = "https://amarildo1963.github.io/jaa/fotos/";
        const MESES = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        let dbPessoas = [];

        // Funções Utilitárias
        const parseData = (str) => {
            if (!str) return null;
            const [d, m, y] = str.split('/');
            return new Date(y || new Date().getFullYear(), m - 1, d);
        };

        const calcularIdade = (nasc, falec) => {
            const fim = falec ? new Date(falec) : new Date();
            const inicio = new Date(nasc);
            let anos = fim.getFullYear() - inicio.getFullYear();
            if (fim.getMonth() < inicio.getMonth() || (fim.getMonth() === inicio.getMonth() && fim.getDate() < inicio.getDate())) anos--;
            return anos;
        };

        // Carregamento de Dados
        async function init() {
            try {
                const res = await fetch('dados.json');
                const data = await res.json();
                
                dbPessoas = data.map((p, i) => {
                    const dNasc = parseData(p.nascimento);
                    const dFalec = parseData(p.falecimento);
                    return {
                        ...p,
                        id: `p-${i}`,
                        dNasc, dFalec,
                        mesIdx: dNasc.getMonth(),
                        idade: calcularIdade(dNasc, dFalec)
                    };
                });

                render();
                checkBirthdays();
            } catch (err) {
                console.error("Erro ao carregar:", err);
                document.getElementById('stats').innerText = "Erro ao carregar banco de dados.";
            }
        }

        function render(filtro = "") {
            const container = document.getElementById('main-content');
            container.innerHTML = "";
            const termo = filtro.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            MESES.forEach((mesNome, idx) => {
                const filtrados = dbPessoas.filter(p => {
                    if (p.mesIdx !== idx) return false;
                    const searchPool = `${p.nome} ${p.nascimento} ${p.familia || ''} ${mesNome}`.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    return searchPool.includes(termo);
                });

                if (filtrados.length > 0) {
                    const section = document.createElement('section');
                    section.className = 'mes-section';
                    section.innerHTML = `<h2 class="mes-titulo">${mesNome}</h2>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid-container';

                    filtrados.forEach(p => {
                        grid.innerHTML += `
                            <article class="registro-card" id="${p.id}">
                                <div class="card-actions">
                                    <img src="info.png" class="icon-btn" title="Informações" onclick="alert('${p.info || 'Sem detalhes'}')">
                                    <img src="pdf-print.png" class="icon-btn" title="Gerar Ficha" onclick="window.print()">
                                </div>
                                <div class="img-container">
                                    <img src="${BASE_IMG_URL}${p.imagem}" class="img-pessoa" alt="${p.nome}" loading="lazy">
                                </div>
                                <span class="nome">${p.nome}</span>
                                <div class="info-label">
                                    <p>★ ${p.nascimento}</p>
                                    ${p.falecimento ? `<p class="falecida">✝ ${p.falecimento} (Viveu ${p.idade} anos)</p>` : `<p class="viva">${p.idade} anos</p>`}
                                </div>
                            </article>
                        `;
                    });
                    
                    section.appendChild(grid);
                    container.appendChild(section);
                }
            });
            
            document.getElementById('stats').innerText = `Exibindo ${container.querySelectorAll('.registro-card').length} de ${dbPessoas.length} registros`;
        }

        function checkBirthdays() {
            const hoje = new Date();
            const aniversariantes = dbPessoas.filter(p => 
                p.dNasc.getDate() === hoje.getDate() && p.dNasc.getMonth() === hoje.getMonth()
            );

            if (aniversariantes.length > 0) {
                const overlay = document.getElementById('birthday-overlay');
                const display = document.getElementById('overlay-data');
                display.innerHTML = `<h3>🎂 Aniversariantes de Hoje!</h3><br>` + 
                    aniversariantes.map(p => `<p><strong>${p.nome}</strong></p>`).join('');
                overlay.style.display = 'flex';
            }
        }

        function limparBusca() {
            document.getElementById('searchInput').value = "";
            render();
        }

        function filtrarAnerao() {
            document.getElementById('searchInput').value = "Anerão";
            render("Anerão");
        }

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));

        init();
    </script>
</body>
</html>
