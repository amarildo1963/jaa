<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - Anerão</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://amarildo1963.github.io/jaa/fotos/favicon.png">
    <style>
        /* ESTILIZAÇÃO GLOBAL E LAYOUT */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); background-attachment: fixed; padding: 20px; padding-bottom: 100px; }
        
        /* CABEÇALHO */
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .img-topo { width: 50px; height: auto; cursor: pointer; transition: transform 0.2s; }
        .img-topo:hover { transform: scale(1.1); }
        h3 { color: blue; font-size: 24px; margin-bottom: 0; }
        
        /* CONTROLES */
        .controls { max-width: 800px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input[type="text"] { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ccc; background-color: rgba(255,255,255,0.8); }
        .btn-limpar { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 5px; }
        .stats { text-align: center; margin-bottom: 10px; font-weight: bold; }
        
        /* CARDS E GRID */
        .mes-titulo { color: red; font-weight: bold; font-size: 28px; text-align: center; margin: 40px 0 20px; text-transform: uppercase; }
        .grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .registro-card { background: rgba(224, 224, 224, 0.9); border: 2px solid #bbb; border-radius: 10px; padding: 15px; width: 280px; text-align: center; position: relative; transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .registro-card:hover { transform: translateY(-3px); }
        
        /* ELEMENTOS DO CARD */
        .photo-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; position: relative; }
        .img-container { position: relative; width: 120px; height: 120px; cursor: pointer; }
        .img-pessoa { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid #B8860B; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .icon-luto { width: 25px; height: auto; margin-left: 5px; }
        .icon-info { width: 32px; height: 32px; cursor: pointer; transition: opacity 0.2s; }
        .icon-info:hover { opacity: 0.7; }
        .info-bubble { display: none; position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 90%; background-color: #ffffe0; border: 1px solid black; border-radius: 8px; padding: 10px; z-index: 10; text-align: left; font-size: 11px; color: black; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* AJUDA E MANUTENÇÃO */
        .help-container { position: relative; display: inline-block; margin-top: 10px; text-align: center; }
        .help-icon { width: 30px; height: 30px; cursor: pointer; vertical-align: middle; margin-bottom: 5px; }
        #help-bubble { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 250px; background-color: white; border: 1px solid black; border-radius: 10px; padding: 10px; z-index: 100; text-align: left; font-size: 12px; color: blue; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        /* ANIMAÇÕES */
        @keyframes pulse-img { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulse-active { animation: pulse-img 1s linear 10; }
        @keyframes target-blink { 0%, 100% { background-color: rgba(224, 224, 224, 0.9); } 50% { background-color: yellow; } }
        .highlight-target { animation: target-blink 0.5s ease-in-out 10; }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .bday-msg { color: red; font-weight: bold; animation: blink-red 0.8s infinite; margin-top: 5px; font-size: 0.9em; }
        @keyframes blink-blue { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .scroll-top { position: fixed; bottom: 20px; right: 20px; font-size: 40px; color: blue; text-decoration: none; animation: blink-blue 1s infinite; cursor: pointer; z-index: 100; }
        .scroll-bottom { position: fixed; bottom: 20px; right: 70px; font-size: 40px; color: blue; text-decoration: none; animation: blink-blue 1s infinite; cursor: pointer; z-index: 100; }
        
        /* TIPOGRAFIA DE DADOS */
        .nome { color: blue; font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }
        .info-nasc { color: green; font-weight: bold; }
        .info-falec { color: #b8860b; font-weight: bold; }
        .info-idade-viva { color: green; font-weight: bold; }
        .info-idade-morta { color: #b8860b; font-weight: bold; }
        .highlight { background-color: yellow; }
        
        /* LISTA ALFABÉTICA - VISUAL MODERNO */
        #lista-alfabetica-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 25px;
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .lista-titulo { color: #1e293b; font-size: 22px; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        .lista-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .lista-item { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; transition: all 0.2s; display: flex; align-items: center; }
        .lista-item:hover { border-color: #3b82f6; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transform: scale(1.02); }
        .lista-link { text-decoration: none; color: #475569; font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 10px; width: 100%; }
        .lista-link:hover { color: #2563eb; }
        .micro-foto { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        
        footer { text-align: center; margin-top: 50px; font-size: 14px; border-top: 1px solid #ccc; padding-top: 20px; background: rgba(235, 237, 238, 0.8); padding-bottom: 20px;}
    </style>
</head>
<body>

    <a href="#" class="scroll-top" id="backToTop">▲</a>
    <a href="#footer" class="scroll-bottom" id="goToBottom">▼</a>

    <div class="header-container">
        <a href="index.html">
            <img src="https://amarildo1963.github.io/jaa/fotos/aniver.png" alt="Ícone Aniversário" class="img-topo">
        </a>
        <h3>ANIVERSARIANTES</h3>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Buscar (nome, data, mês, signo, etc...)">
        <button class="btn-limpar" onclick="limparBusca()">Limpar 🧹</button>
    </div>

    <div class="stats" id="stats">Carregando dados...</div>

    <div id="conteudo"></div>

    <div id="lista-alfabetica-container">
        <h2 class="lista-titulo">Lista Alfabética Completa</h2>
        <div id="listaAlfabetica" class="lista-grid"></div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <div class="help-container">
            <img src="https://amarildo1963.github.io/jaa/fotos/ajuda.png" class="help-icon" onclick="toggleHelp()" alt="Ajuda">
            <div id="help-bubble">
                Sistema criado por Amarildo Anerão para consulta de datas comemorativas da família e amigos.<br><br>
                Use a busca acima para filtrar por qualquer termo.
            </div>
        </div>
    </div>

    <footer id="footer">
        &copy; 2026 - Memorial da Família Anerão
    </footer>

    <script>
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        let pessoas = [];

        function parseData(str) {
            if (!str) return null;
            const parts = str.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function getSigno(dia, mes) {
            if ((mes == 1 && dia >= 21) || (mes == 2 && dia <= 18)) return ["♒", "Aquário"];
            if ((mes == 2 && dia >= 19) || (mes == 3 && dia <= 20)) return ["♓", "Peixes"];
            if ((mes == 3 && dia >= 21) || (mes == 4 && dia <= 20)) return ["♈", "Áries"];
            if ((mes == 4 && dia >= 21) || (mes == 5 && dia <= 20)) return ["♉", "Touro"];
            if ((mes == 5 && dia >= 21) || (mes == 6 && dia <= 20)) return ["♊", "Gêmeos"];
            if ((mes == 6 && dia >= 21) || (mes == 7 && dia <= 22)) return ["♋", "Câncer"];
            if ((mes == 7 && dia >= 23) || (mes == 8 && dia <= 22)) return ["♌", "Leão"];
            if ((mes == 8 && dia >= 23) || (mes == 9 && dia <= 22)) return ["♍", "Virgem"];
            if ((mes == 9 && dia >= 23) || (mes == 10 && dia <= 22)) return ["♎", "Libra"];
            if ((mes == 10 && dia >= 23) || (mes == 11 && dia <= 21)) return ["♏", "Escorpião"];
            if ((mes == 11 && dia >= 22) || (mes == 12 && dia <= 21)) return ["♐", "Sagitário"];
            return ["♑", "Capricórnio"];
        }

        function calcularIdade(nasc, falec) {
            const hoje = new Date();
            const fim = falec ? new Date(falec) : hoje;
            const inicio = new Date(nasc);
            let idade = fim.getFullYear() - inicio.getFullYear();
            const m = fim.getMonth() - inicio.getMonth();
            if (m < 0 || (m === 0 && fim.getDate() < inicio.getDate())) idade--;
            
            const diffTime = Math.abs(fim - inicio);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return { anos: idade, dias: diffDays };
        }

        async function carregarDados() {
            try {
                // Carregando do arquivo local conforme solicitado
                const response = await fetch('dados.json');
                const data = await response.json();
                
                pessoas = data.pessoas.map(p => {
                    const dNasc = parseData(p.nascimento);
                    const dFalec = parseData(p.falecimento);
                    const signoArr = dNasc ? getSigno(dNasc.getDate(), dNasc.getMonth() + 1) : ["", ""];
                    
                    // Concatena as informações adicionais da nova estrutura
                    let infoExtra = "";
                    if (p.informacoes_adicionais) {
                        const infos = Object.values(p.informacoes_adicionais).filter(v => v && v !== "|||||");
                        infoExtra = infos.join("<br>");
                    }

                    return {
                        ...p,
                        dNasc,
                        dFalec,
                        mesNum: dNasc ? dNasc.getMonth() : -1,
                        dia: dNasc ? dNasc.getDate() : 0,
                        signo: `${signoArr[0]} ${signoArr[1]}`,
                        infoExtra
                    };
                });

                render();
            } catch (error) {
                document.getElementById('stats').innerText = "Erro ao carregar dados.";
                console.error("Erro:", error);
            }
        }

        function mostrarInfo(id) {
            const el = document.getElementById('info-' + id);
            if (el) {
                el.style.display = (el.style.display === 'block') ? 'none' : 'block';
                if (el.style.display === 'block') {
                    setTimeout(() => { el.style.display = 'none'; }, 10000);
                }
            }
        }

        function irParaRegistro(id) {
            const el = document.getElementById('card-' + id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight-target');
                setTimeout(() => el.classList.remove('highlight-target'), 10000);
            }
        }

        function destacar(texto, termo) {
            if (!termo || !texto) return texto;
            const regex = new RegExp(`(${termo})`, 'gi');
            return texto.toString().replace(regex, '<span class="highlight">$1</span>');
        }

        function render(filtro = "") {
            const container = document.getElementById('conteudo');
            const listaUl = document.getElementById('listaAlfabetica');
            container.innerHTML = "";
            listaUl.innerHTML = "";
            let count = 0;

            const hoje = new Date();
            const hojeDM = hoje.getDate().toString().padStart(2,'0') + (hoje.getMonth()+1).toString().padStart(2,'0');
            const termo = filtro.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

            // Renderizar Cards por Mês
            mesesNomes.forEach((mesNome, idx) => {
                const filtrados = pessoas.filter(p => p.mesNum === idx).filter(p => {
                    if (!termo) return true;
                    const buscaString = `${p.nome} ${p.nascimento} ${p.signo} ${p.infoExtra}`.toLowerCase();
                    return buscaString.includes(termo);
                }).sort((a,b) => a.dia - b.dia);

                if (filtrados.length > 0) {
                    const mesSec = document.createElement('section');
                    mesSec.innerHTML = `<h2 class="mes-titulo">${mesNome}</h2><div class="grid-container" id="grid-${idx}"></div>`;
                    container.appendChild(mesSec);
                    
                    const grid = document.getElementById(`grid-${idx}`);
                    filtrados.forEach(p => {
                        count++;
                        const dadosIdade = calcularIdade(p.dNasc, p.dFalec);
                        const isBday = p.nascimento.substring(0,5).replace('/','') === hojeDM;
                        const fotoPath = `https://amarildo1963.github.io/jaa/fotos/${p.imagem}`;

                        const card = document.createElement('div');
                        card.className = 'registro-card';
                        card.id = 'card-' + p.id;
                        card.innerHTML = `
                            <div class="photo-wrapper">
                                <div class="img-container" onclick="mostrarInfo(${p.id})">
                                    <img src="${fotoPath}" class="img-pessoa ${isBday ? 'pulse-active' : ''}" onerror="this.src='https://amarildo1963.github.io/jaa/fotos/falta_a_imagem.jpg'">
                                    <div class="info-bubble" id="info-${p.id}">${p.infoExtra}</div>
                                </div>
                                ${p.dFalec ? '<img src="https://amarildo1963.github.io/jaa/fotos/luto.png" class="icon-luto" title="Falecido">' : ''}
                                <img src="https://amarildo1963.github.io/jaa/fotos/detalhes.png" class="icon-info" onclick="mostrarInfo(${p.id})" title="Ver detalhes">
                            </div>
                            <span class="nome">${destacar(p.nome, termo)}</span>
                            <div class="info-nasc">Nasc: ${destacar(p.nascimento, termo)}</div>
                            ${p.dFalec ? `<div class="info-falec">Falec: ${p.falecimento}</div>` : ''}
                            ${p.dFalec ? 
                                `<div class="info-idade-morta">viveu ${dadosIdade.anos} anos</div>` : 
                                `<div class="info-idade-viva">${dadosIdade.anos} anos</div>`
                            }
                            <div>${destacar(p.signo, termo)}</div>
                            ${isBday ? '<div class="bday-msg">🎉 PARABÉNS! 🎂</div>' : ''}
                        `;
                        grid.appendChild(card);
                    });
                }
            });

            // Renderizar Lista Alfabética
            const alfabetica = [...pessoas].sort((a,b) => a.nome.localeCompare(b.nome));
            alfabetica.forEach(p => {
                const item = document.createElement('div');
                item.className = 'lista-item';
                item.innerHTML = `
                    <a href="javascript:void(0)" class="lista-link" onclick="irParaRegistro(${p.id})">
                        <img src="https://amarildo1963.github.io/jaa/fotos/${p.imagem}" class="micro-foto" onerror="this.src='https://amarildo1963.github.io/jaa/fotos/falta_a_imagem.jpg'">
                        ${p.nome} (${p.nascimento})
                    </a>
                `;
                listaUl.appendChild(item);
            });

            document.getElementById('stats').innerText = `Encontrados: ${count} registros`;
        }

        let debounceTimer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => render(e.target.value), 250);
        });

        function limparBusca() {
            document.getElementById('searchInput').value = "";
            render();
        }

        function toggleHelp() {
            const bubble = document.getElementById('help-bubble');
            bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
