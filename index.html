<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - Manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://amarildo1963.github.io/jaa/fotos/favicon.png">
    <style>
        /* MANTENDO ESTILOS ORIGINAIS E ADICIONANDO MANUTENÇÃO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); background-attachment: fixed; padding: 20px; padding-bottom: 100px; }
        
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .img-topo { width: 50px; height: auto; cursor: pointer; transition: transform 0.2s; }
        h3 { color: blue; font-size: 24px; margin-bottom: 0; }
        
        .controls { max-width: 800px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input[type="text"] { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ccc; background-color: rgba(255,255,255,0.8); }
        .btn-limpar { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 5px; }
        .stats { text-align: center; margin-bottom: 10px; font-weight: bold; }
        
        .mes-titulo { color: red; font-weight: bold; font-size: 28px; text-align: center; margin: 40px 0 20px; text-transform: uppercase; }
        .grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .registro-card { background: rgba(224, 224, 224, 0.9); border: 2px solid #bbb; border-radius: 10px; padding: 15px; width: 280px; text-align: center; position: relative; transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* ESTILOS DA ÁREA DE MANUTENÇÃO */
        #modal-manutencao { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; padding: 20px; }
        .manut-container { background: white; max-width: 600px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .manut-container h2 { color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .manut-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-acao { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-save { background: #10b981; color: white; }
        .btn-cancel { background: #ef4444; color: white; }
        .btn-delete { background: #6b7280; color: white; }
        .edit-icon { position: absolute; top: 10px; right: 10px; cursor: pointer; background: #3b82f6; color: white; padding: 5px; border-radius: 5px; font-size: 10px; }

        /* RODAPÉ E ÍCONES */
        .manut-icon { width: 32px; height: 32px; cursor: pointer; vertical-align: middle; margin-left: 10px; transition: transform 0.2s; }
        .manut-icon:hover { transform: rotate(20deg); }
        footer { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #ccc; background: rgba(235, 237, 238, 0.8); }

        /* REUTILIZANDO OS ESTILOS ORIGINAIS DO SEU ARQUIVO */
        .photo-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; position: relative; }
        .img-container { position: relative; width: 120px; height: 120px; cursor: pointer; }
        .img-pessoa { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid #B8860B; }
        .info-bubble { display: none; position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 90%; background-color: #ffffe0; border: 1px solid black; border-radius: 8px; padding: 10px; z-index: 10; text-align: left; font-size: 11px; font-weight: bold; }
        .nome { color: blue; font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }
        .info-nasc { color: green; font-weight: bold; }
        .info-falec { color: #b8860b; font-weight: bold; }
        .info-idade-viva { color: green; font-weight: bold; }
        .info-idade-morta { color: #b8860b; font-weight: bold; }
        .scroll-top, .scroll-bottom { position: fixed; bottom: 20px; font-size: 40px; color: blue; text-decoration: none; z-index: 100; }
        .scroll-top { right: 20px; }
        .scroll-bottom { right: 70px; }
    </style>
</head>
<body>

    <a href="#" class="scroll-top">▲</a>
    <a href="#footer" class="scroll-bottom">▼</a>

    <div class="header-container">
        <a href="index.html"><img src="aniver.png" alt="Ícone" class="img-topo"></a>
        <h3>ANIVERSARIANTES</h3>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Buscar (nome, data, mês, signo, etc...)">
        <button class="btn-limpar" onclick="limparBusca()">Limpar 🧹</button>
        <button class="btn-limpar" style="background: #3b82f6; color: white;" onclick="abrirManutencao()">Novo Registro ➕</button>
    </div>

    <div class="stats" id="stats">Carregando dados...</div>
    <div id="conteudo"></div>

    <div id="modal-manutencao">
        <div class="manut-container">
            <h2 id="manut-titulo">Manutenção de Registro</h2>
            <input type="hidden" id="edit-index">
            
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="m-nome" placeholder="Ex: José Amarildo" oninput="capitalizar(this)">
            </div>
            
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Nascimento (DD/MM/AAAA)</label>
                    <input type="text" id="m-nasc" placeholder="00/00/0000" maxlength="10">
                </div>
                <div style="flex: 1;">
                    <label>Falecimento (Opcional)</label>
                    <input type="text" id="m-falec" placeholder="00/00/0000" maxlength="10">
                </div>
            </div>

            <div class="form-group">
                <label>Nome da Imagem (Ex: foto.jpg - Deve ser 500x500)</label>
                <input type="text" id="m-img" placeholder="nome_da_pessoa.jpg">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 5px;">
                <div class="form-group"><label>Info 01</label><input type="text" id="m-i1" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 02</label><input type="text" id="m-i2" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 03</label><input type="text" id="m-i3" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 04</label><input type="text" id="m-i4" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 05</label><input type="text" id="m-i5" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 06</label><input type="text" id="m-i6" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 07</label><input type="text" id="m-i7" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 08</label><input type="text" id="m-i8" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 09</label><input type="text" id="m-i9" oninput="capitalizar(this)"></div>
                <div class="form-group"><label>Info 10</label><input type="text" id="m-i10" oninput="capitalizar(this)"></div>
            </div>

            <div class="manut-btns">
                <button class="btn-acao btn-save" onclick="salvarRegistro()">Gravar Dados 💾</button>
                <button id="btn-excluir" class="btn-acao btn-delete" style="display:none;" onclick="excluirRegistro()">Excluir 🗑️</button>
                <button class="btn-acao btn-cancel" onclick="fecharManutencao()">Fechar</button>
            </div>
            <p style="font-size: 10px; margin-top: 10px; color: gray;">* Após salvar, você precisará baixar o arquivo JSON atualizado para subir no GitHub.</p>
        </div>
    </div>

    <footer id="footer">
        ©2016-2026 JAAnerão<br>
        jaanerao@hotmail.com | Versão 1.03 (Manutenção)<br>
        <img src="help.png" class="help-icon" onclick="toggleHelp()" style="width:30px; cursor:pointer;">
        <img src="manut.png" class="manut-icon" onclick="abrirManutencao()" alt="Manutenção">
    </footer>

<script>
const BASE_URL = "https://amarildo1963.github.io/jaa/fotos/";
const PASS_KEY = "100941291137";
let pessoas = [];
let dadosOriginais = []; // Para manter o formato original do JSON

// Lógica de Capitalização
function capitalizar(input) {
    let valor = input.value;
    if (valor.length > 0) {
        input.value = valor.charAt(0).toUpperCase() + valor.slice(1);
    }
}

// Abrir Manutenção com Senha
function abrirManutencao(index = null) {
    const senha = prompt("Digite a senha de manutenção:");
    if (senha !== PASS_KEY) {
        alert("Senha incorreta!");
        return;
    }

    document.getElementById('modal-manutencao').style.display = 'block';
    if (index !== null) {
        const p = pessoas[index];
        document.getElementById('manut-titulo').innerText = "Alterar Registro";
        document.getElementById('edit-index').value = index;
        document.getElementById('m-nome').value = p.nome;
        document.getElementById('m-nasc').value = p.nascStr;
        document.getElementById('m-falec').value = p.falecStr || "";
        document.getElementById('m-img').value = p.img;
        document.getElementById('m-i1').value = p.Info01 || "";
        document.getElementById('m-i2').value = p.Info02 || "";
        document.getElementById('m-i3').value = p.Info03 || "";
        document.getElementById('m-i4').value = p.Info04 || "";
        document.getElementById('m-i5').value = p.Info05 || "";
        document.getElementById('m-i6').value = p.Info06 || "";
        document.getElementById('m-i7').value = p.Info07 || "";
        document.getElementById('m-i8').value = p.Info08 || "";
        document.getElementById('m-i9').value = p.Info09 || "";
        document.getElementById('m-i10').value = p.Info10 || "";
        document.getElementById('btn-excluir').style.display = 'block';
    } else {
        limparFormManut();
    }
}

function fecharManutencao() {
    document.getElementById('modal-manutencao').style.display = 'none';
}

function limparFormManut() {
    document.getElementById('manut-titulo').innerText = "Novo Registro";
    document.getElementById('edit-index').value = "";
    document.getElementById('btn-excluir').style.display = 'none';
    const campos = ['m-nome', 'm-nasc', 'm-falec', 'm-img', 'm-i1', 'm-i2', 'm-i3', 'm-i4', 'm-i5', 'm-i6', 'm-i7', 'm-i8', 'm-i9', 'm-i10'];
    campos.forEach(c => document.getElementById(c).value = "");
}

// SALVAR E GERAR JSON
function salvarRegistro() {
    const index = document.getElementById('edit-index').value;
    const novoRegistro = {
        "nome": document.getElementById('m-nome').value,
        "nascimento": document.getElementById('m-nasc').value,
        "falecimento": document.getElementById('m-falec').value,
        "imagem": document.getElementById('m-img').value.toLowerCase().endsWith('.jpg') ? document.getElementById('m-img').value : document.getElementById('m-img').value + ".jpg",
        "info": "",
        "Info01": document.getElementById('m-i1').value,
        "Info02": document.getElementById('m-i2').value,
        "Info03": document.getElementById('m-i3').value,
        "Info04": document.getElementById('m-i4').value,
        "Info05": document.getElementById('m-i5').value,
        "Info06": document.getElementById('m-i6').value,
        "Info07": document.getElementById('m-i7').value,
        "Info08": document.getElementById('m-i8').value,
        "Info09": document.getElementById('m-i9').value,
        "Info10": document.getElementById('m-i10').value
    };

    if (index === "") {
        dadosOriginais.push(novoRegistro);
    } else {
        dadosOriginais[index] = novoRegistro;
    }

    baixarJSON();
    location.reload(); // Recarrega para ver as mudanças locais
}

function excluirRegistro() {
    if (confirm("Tem certeza que deseja excluir este registro?")) {
        const index = document.getElementById('edit-index').value;
        dadosOriginais.splice(index, 1);
        baixarJSON();
        location.reload();
    }
}

function baixarJSON() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dadosOriginais, null, 2));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "dados.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
    alert("Arquivo 'dados.json' gerado! Substitua-o no seu GitHub para atualizar o site oficialmente.");
}

// --- FUNÇÕES DE RENDERIZAÇÃO ORIGINAIS ---

async function carregarDados() {
    try {
        const response = await fetch('dados.json');
        dadosOriginais = await response.json();
        
        pessoas = dadosOriginais.map((p, index) => {
            const dNasc = parsingDatas(p.nascimento);
            const dFalec = parsingDatas(p.falecimento);
            return {
                id: index,
                nome: p.nome, nascStr: p.nascimento, falecStr: p.falecimento,
                dNasc, dFalec, img: p.imagem,
                mesNum: dNasc ? dNasc.getMonth() : 0,
                Info01: p.Info01, Info02: p.Info02, Info03: p.Info03, Info04: p.Info04, Info05: p.Info05,
                Info06: p.Info06, Info07: p.Info07, Info08: p.Info08, Info09: p.Info09, Info10: p.Info10
            };
        });
        render();
    } catch (e) { console.error(e); }
}

function parsingDatas(str) {
    if (!str || str.trim() === "") return null;
    const parts = str.split('/');
    return new Date(parts[2], parts[1] - 1, parts[0]);
}

function render(filtro = "") {
    const container = document.getElementById('conteudo');
    container.innerHTML = "";
    const mesesNomes = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

    mesesNomes.forEach((mes, idx) => {
        const filtrados = pessoas.filter(p => p.mesNum === idx);
        if (filtrados.length > 0) {
            const mesDiv = document.createElement('div');
            mesDiv.innerHTML = `<div class="mes-titulo">${mes}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid-container';

            filtrados.forEach(p => {
                const card = document.createElement('div');
                card.className = 'registro-card';
                card.innerHTML = `
                    <div class="edit-icon" onclick="abrirManutencao(${p.id})">EDITAR ⚙️</div>
                    <div class="photo-wrapper">
                        <div class="img-container">
                            <img src="${BASE_URL}${p.img}" class="img-pessoa" alt="${p.nome}">
                        </div>
                    </div>
                    <span class="nome">${p.nome}</span>
                    <div class="info-nasc">★ ${p.nascStr}</div>
                    ${p.falecStr ? `<div class="info-falec">✝ ${p.falecStr}</div>` : ''}
                `;
                grid.appendChild(card);
            });
            mesDiv.appendChild(grid);
            container.appendChild(mesDiv);
        }
    });
    document.getElementById('stats').innerText = `Registros: ${pessoas.length}`;
}

carregarDados();
</script>
</body>
</html>
