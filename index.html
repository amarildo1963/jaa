<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversariantes - Anerão</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --primary:#2563eb;
  --accent:#f59e0b;
  --text:#111827;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}

body{
  background:var(--bg);
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}
.header img{width:40px;}
.header h1{font-size:22px;color:var(--primary);}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}
.controls input{
  padding:10px;
  width:260px;
  border-radius:8px;
  border:1px solid #ccc;
}
.controls button{
  padding:10px 16px;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
  transition:.2s;
}
.card:hover{transform:translateY(-4px);}

.card img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid var(--accent);
}

.nome{font-weight:700;margin-top:8px;color:var(--primary);}
.info{font-size:13px;margin-top:4px;}

/* LISTA */
.lista{
  margin-top:40px;
}
.lista h2{margin-bottom:10px;color:var(--primary);}
.lista ul{list-style:none;}
.lista li{padding:6px 0;border-bottom:1px solid #ddd;cursor:pointer;}

footer{
  margin-top:40px;
  text-align:center;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <img src="aniver.png">
  <h1>ANIVERSARIANTES</h1>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar...">
  <button onclick="limpar()">Limpar</button>
</div>

<div id="stats"></div>
<div id="grid" class="grid"></div>

<div class="lista">
  <h2>Lista Alfabética</h2>
  <ul id="lista"></ul>
</div>

<footer>
©2016-2026 JAAnerão
</footer>

<script>
const BASE_URL = "https://amarildo1963.github.io/jaa/fotos/";
let pessoas = [];

const elGrid = document.getElementById('grid');
const elLista = document.getElementById('lista');
const elStats = document.getElementById('stats');

/* LOAD */
async function load(){
  const res = await fetch('dados.json');
  const data = await res.json();

  pessoas = data.map((p,i)=>({
    id:i,
    nome:p.nome,
    nasc:p.nascimento,
    img:p.imagem
  }));

  render();
}

/* RENDER */
function render(filtro=""){
  const termo = filtro.toLowerCase();

  const filtrados = pessoas.filter(p =>
    p.nome.toLowerCase().includes(termo)
  );

  elGrid.innerHTML = filtrados.map(p=>`
    <div class="card" onclick="scrollToItem(${p.id})">
      <img loading="lazy" src="${BASE_URL}${p.img}">
      <div class="nome">${p.nome}</div>
      <div class="info">${p.nasc}</div>
    </div>
  `).join("");

  elLista.innerHTML = pessoas
    .sort((a,b)=>a.nome.localeCompare(b.nome))
    .map(p=>`<li onclick="scrollToItem(${p.id})">${p.nome}</li>`)
    .join("");

  elStats.innerText = `Total: ${pessoas.length} | Filtrados: ${filtrados.length}`;
}

/* EVENTS */
document.getElementById('search').addEventListener('input', e=>{
  render(e.target.value);
});

function limpar(){
  document.getElementById('search').value="";
  render();
}

function scrollToItem(id){
  const card = document.querySelectorAll('.card')[id];
  if(card){
    card.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

load();
</script>

</body>
</html>
